[gcode_macro TIMELAPSE_RESTART]
description: Restart timelapse monitor and serial listener
gcode:
    {action_call_remote_method("run_shell_command", cmd="/userdata/scripts/restart_monitor.sh")}
    M117 Timelapse monitor restarted

[gcode_macro TIMELAPSE_STOP]
description: Stop timelapse monitor and serial listener
gcode:
    {action_call_remote_method("run_shell_command", cmd="pkill -9 -f timelapse_monitor.py; pkill -9 -f serial_listener.py")}
    M117 Timelapse monitor stopped

[gcode_macro TIMELAPSE_START]
description: Start timelapse monitor and serial listener
gcode:
    {action_call_remote_method("run_shell_command", cmd="python3 /userdata/scripts/serial_listener.py > /dev/null 2>&1 & sleep 1; python3 /userdata/scripts/timelapse_monitor.py > /dev/null 2>&1 &")}
    M117 Timelapse monitor started

[gcode_macro TIMELAPSE_STATUS]
description: Check timelapse monitor status
gcode:
    {action_call_remote_method("run_shell_command", cmd="ps aux | grep -E '(timelapse_monitor|serial_listener)' | grep -v grep")}
